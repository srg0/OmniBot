services:
  omnibot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    environment:
      OMNIBOT_DATA_DIR: /data
      OMNIBOT_STATIC_ROOT: /app/backend/static
      HOST: "0.0.0.0"
      PORT: "8000"
      # Optional: pre-configure Gemini (otherwise use the dashboard first-run / Hub settings UI)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Dev only: fake BLE device in /setup/scan when no hardware is found (omit in production)
      # OMNIBOT_SETUP_SIMULATE_DEVICE: "1"
    volumes:
      - omnibot_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ping')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  omnibot_data:
